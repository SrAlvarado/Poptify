<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spotify PopUp · Prototipo de diseño</title>
<style>
  :root {
    --glass: rgba(255, 255, 255, 0.08);
    --glass-strong: rgba(255, 255, 255, 0.16);
    --text: rgba(255, 255, 255, 0.98);
    --text-dim: rgba(255, 255, 255, 0.62);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }

  html, body { height: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(1200px 800px at 20% -10%, #2a2a3a, transparent),
      radial-gradient(1000px 700px at 110% 120%, #1a1a24, transparent),
      #0c0c12;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    padding: 32px 24px 64px;
  }

  .stage-header { max-width: 1100px; margin: 0 auto 28px; }
  .stage-header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
  .stage-header p { color: var(--text-dim); font-size: 13px; margin-top: 6px; }

  .album-switcher {
    display: flex; gap: 10px; flex-wrap: wrap;
    max-width: 1100px; margin: 0 auto 36px;
  }
  .album-chip {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px 6px 6px;
    border-radius: 999px;
    background: var(--glass);
    border: 1px solid rgba(255,255,255,0.08);
    cursor: pointer; transition: all .2s ease;
    font-size: 13px; font-weight: 600;
  }
  .album-chip:hover { background: var(--glass-strong); }
  .album-chip.active { background: #fff; color: #111; }
  .album-chip .swatch { width: 26px; height: 26px; border-radius: 7px; }

  /* ---------- POPUP ---------- */
  .popup {
    position: fixed;
    top: 140px; left: 80px;
    width: 360px;
    border-radius: 38px;
    overflow: hidden;
    box-shadow: 0 40px 90px -20px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.07);
    backdrop-filter: blur(2px);
    transition: box-shadow .3s ease;
    z-index: 10;
  }

  /* reactive background layers */
  .bg {
    position: absolute; inset: 0; z-index: 0;
    transition: background 0.8s ease;
  }
  .bg-noise {
    position: absolute; inset: 0; z-index: 1;
    backdrop-filter: blur(60px) saturate(180%);
    -webkit-backdrop-filter: blur(60px) saturate(180%);
    background: rgba(0,0,0,0.28);
  }

  .popup-inner {
    position: relative; z-index: 2;
    padding: 22px 22px 26px;
  }

  /* drag handle / status bar */
  .drag-bar {
    display: flex; align-items: center; justify-content: space-between;
    cursor: grab;
    padding: 2px 4px 16px;
  }
  .drag-bar:active { cursor: grabbing; }
  .drag-bar .now { font-size: 13px; font-weight: 600; opacity: .85; display:flex; align-items:center; gap:7px;}
  .drag-bar .now .live { width:7px; height:7px; border-radius:50%; background:#1ed760; box-shadow:0 0 8px #1ed760; }
  .grip { width: 38px; height: 5px; border-radius: 99px; background: rgba(255,255,255,0.35); margin: 0 auto; position:absolute; left:50%; transform:translateX(-50%); top:8px;}

  /* album art */
  .art-wrap { position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px -12px rgba(0,0,0,0.6); aspect-ratio:1; }
  .art-wrap canvas, .art-wrap .art { width: 100%; height: 100%; display: block; }

  /* track info */
  .track { margin-top: 22px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .track .title { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; }
  .track .artist { font-size: 16px; color: var(--text-dim); margin-top: 3px; font-weight: 500; }
  .icon-btn {
    background: none; border: none; color: var(--text); cursor: pointer;
    width: 34px; height: 34px; display: grid; place-items: center; border-radius: 50%;
    transition: transform .15s ease, color .2s ease; flex-shrink: 0;
  }
  .icon-btn:hover { transform: scale(1.12); }
  .icon-btn.liked { color: #1ed760; }

  /* scrubber */
  .scrubber { margin-top: 20px; }
  .bar { height: 7px; border-radius: 99px; background: rgba(255,255,255,0.22); position: relative; overflow: hidden; cursor: pointer; }
  .bar .fill { position: absolute; left: 0; top: 0; bottom: 0; width: 38%; background: rgba(255,255,255,0.95); border-radius: 99px; }
  .times { display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  /* controls */
  .controls { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 30px; }
  .controls .icon-btn { width: 48px; height: 48px; }
  .controls .play { width: 68px; height: 68px; background: #fff; color: #111; border-radius: 50%; }
  .controls .play:hover { transform: scale(1.06); }

  /* bottom actions: lyrics / video */
  .actions { margin-top: 24px; display: flex; gap: 12px; }
  .pill {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px; border-radius: 16px;
    background: var(--glass); border: 1px solid rgba(255,255,255,0.08);
    color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .2s ease;
  }
  .pill:hover { background: var(--glass-strong); }
  .pill svg { opacity: .9; }

  .hint { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: var(--text-dim); font-size: 12px; z-index: 5; }
</style>
</head>
<body>
  <div class="stage-header">
    <h1>🎧 Spotify PopUp — Prototipo de diseño</h1>
    <p>Estilo "pantalla de bloqueo de iOS". El fondo reacciona al color de la portada. Arrastra el popup desde la barra superior. Cambia de álbum abajo.</p>
  </div>

  <div class="album-switcher" id="switcher"></div>

  <div class="popup" id="popup">
    <div class="bg" id="bg"></div>
    <div class="bg-noise"></div>
    <div class="popup-inner">
      <div class="grip"></div>
      <div class="drag-bar" id="dragbar">
        <div class="now"><span class="live"></span> Reproduciendo ahora</div>
        <button class="icon-btn" title="Más opciones">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
        </button>
      </div>

      <div class="art-wrap">
        <canvas id="art" width="600" height="600"></canvas>
      </div>

      <div class="track">
        <div>
          <div class="title" id="title">—</div>
          <div class="artist" id="artist">—</div>
        </div>
        <button class="icon-btn" id="likeBtn" title="Favorito">
          <svg id="heart" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 0 0-7.8 7.8l1.1 1L12 21l7.7-7.6 1.1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
        </button>
      </div>

      <div class="scrubber">
        <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
        <div class="times"><span id="cur">1:24</span><span id="dur">-2:18</span></div>
      </div>

      <div class="controls">
        <button class="icon-btn" title="Anterior">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M6 5h2v14H6zM20 5L9 12l11 7z"/></svg>
        </button>
        <button class="icon-btn play" id="playBtn" title="Pausar">
          <svg id="playIcon" width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>
        </button>
        <button class="icon-btn" title="Siguiente">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M16 5h2v14h-2zM4 5l11 7L4 19z"/></svg>
        </button>
      </div>

      <div class="actions">
        <button class="pill" title="Ver letra">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h12M4 18h8"/></svg>
          Letra
        </button>
        <button class="pill" title="Ver vídeo">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="3"/><path d="M10 9l5 3-5 3z" fill="currentColor"/></svg>
          Vídeo
        </button>
      </div>
    </div>
  </div>

  <div class="hint">Arrastra el popup · pulsa play · marca favorito · cambia de álbum</div>

<script>
// ---------- Sample albums (covers generated procedurally so it works offline) ----------
const ALBUMS = [
  { title: "Midnight City", artist: "M83", palette: ["#ff5e62","#ff9966","#2b1055"], dur: 222, cur: 84 },
  { title: "Blonde", artist: "Frank Ocean", palette: ["#f6d365","#fda085","#5a3f37"], dur: 248, cur: 60 },
  { title: "Currents", artist: "Tame Impala", palette: ["#ff6ec4","#7873f5","#0f0c29"], dur: 195, cur: 120 },
  { title: "Discovery", artist: "Daft Punk", palette: ["#f7971e","#ffd200","#3a1c00"], dur: 304, cur: 200 },
  { title: "In Rainbows", artist: "Radiohead", palette: ["#00c6ff","#0072ff","#020111"], dur: 268, cur: 30 },
  { title: "good kid", artist: "Kendrick Lamar", palette: ["#1ed760","#0f5132","#06140c"], dur: 213, cur: 150 },
];

const canvas = document.getElementById('art');
const ctx = canvas.getContext('2d');

function drawCover(album) {
  const w = canvas.width, h = canvas.height;
  const [a, b, c] = album.palette;
  // gradient base
  const g = ctx.createLinearGradient(0, 0, w, h);
  g.addColorStop(0, a); g.addColorStop(0.55, b); g.addColorStop(1, c);
  ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
  // soft geometric blobs for an "album-art" feel
  ctx.globalCompositeOperation = 'overlay';
  for (let i = 0; i < 5; i++) {
    const rg = ctx.createRadialGradient(
      (0.2 + 0.15*i) * w, (0.8 - 0.15*i) * h, 0,
      (0.2 + 0.15*i) * w, (0.8 - 0.15*i) * h, w * (0.3 + 0.05*i));
    rg.addColorStop(0, 'rgba(255,255,255,0.5)');
    rg.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = rg; ctx.fillRect(0, 0, w, h);
  }
  ctx.globalCompositeOperation = 'source-over';
}

// Extract dominant + secondary color from the canvas pixels
function extractColors() {
  const { width, height } = canvas;
  const data = ctx.getImageData(0, 0, width, height).data;
  let r = 0, g = 0, b = 0, n = 0;
  const buckets = {};
  for (let i = 0; i < data.length; i += 4 * 80) {
    const R = data[i], G = data[i+1], B = data[i+2];
    r += R; g += G; b += B; n++;
    const key = `${R>>5},${G>>5},${B>>5}`;
    buckets[key] = (buckets[key] || 0) + 1;
  }
  const avg = [Math.round(r/n), Math.round(g/n), Math.round(b/n)];
  // most frequent vivid bucket
  let best = null, bestScore = -1;
  for (const k in buckets) {
    const [br, bg, bb] = k.split(',').map(x => (parseInt(x)<<5) + 16);
    const sat = Math.max(br,bg,bb) - Math.min(br,bg,bb);
    const score = buckets[k] * (sat + 30);
    if (score > bestScore) { bestScore = score; best = [br, bg, bb]; }
  }
  return { avg, dominant: best || avg };
}

function applyBackground() {
  const { avg, dominant } = extractColors();
  const d = `rgb(${dominant.join(',')})`;
  const a = `rgb(${avg.join(',')})`;
  const dark = `rgb(${dominant.map(v => Math.round(v*0.35)).join(',')})`;
  document.getElementById('bg').style.background =
    `radial-gradient(120% 80% at 30% 10%, ${d}, transparent 60%),
     radial-gradient(120% 90% at 80% 100%, ${a}, transparent 55%),
     linear-gradient(160deg, ${d}, ${dark})`;
}

function fmt(s) { const m = Math.floor(s/60); const sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }

let current = 0;
function load(i) {
  current = i;
  const album = ALBUMS[i];
  drawCover(album);
  applyBackground();
  document.getElementById('title').textContent = album.title;
  document.getElementById('artist').textContent = album.artist;
  const pct = album.cur / album.dur;
  document.getElementById('fill').style.width = (pct*100) + '%';
  document.getElementById('cur').textContent = fmt(album.cur);
  document.getElementById('dur').textContent = '-' + fmt(album.dur - album.cur);
  document.querySelectorAll('.album-chip').forEach((c, idx) => c.classList.toggle('active', idx === i));
}

// build switcher chips
const sw = document.getElementById('switcher');
ALBUMS.forEach((al, i) => {
  const chip = document.createElement('div');
  chip.className = 'album-chip';
  chip.innerHTML = `<span class="swatch" style="background:linear-gradient(135deg,${al.palette[0]},${al.palette[1]})"></span>${al.title}`;
  chip.onclick = () => load(i);
  sw.appendChild(chip);
});

// like toggle
document.getElementById('likeBtn').addEventListener('click', (e) => {
  const btn = e.currentTarget;
  const heart = document.getElementById('heart');
  btn.classList.toggle('liked');
  heart.setAttribute('fill', btn.classList.contains('liked') ? 'currentColor' : 'none');
});

// play/pause toggle
let playing = true;
document.getElementById('playBtn').addEventListener('click', () => {
  playing = !playing;
  document.getElementById('playIcon').innerHTML = playing
    ? '<path d="M7 5h4v14H7zM13 5h4v14h-4z"/>'
    : '<path d="M8 5l12 7-12 7z"/>';
});

// scrub
document.getElementById('bar').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  const al = ALBUMS[current];
  al.cur = Math.round(pct * al.dur);
  load(current);
});

// ---------- drag the popup ----------
const popup = document.getElementById('popup');
const dragbar = document.getElementById('dragbar');
let dragging = false, ox = 0, oy = 0;
dragbar.addEventListener('mousedown', (e) => {
  dragging = true;
  const r = popup.getBoundingClientRect();
  ox = e.clientX - r.left; oy = e.clientY - r.top;
  popup.style.boxShadow = '0 60px 120px -20px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.12)';
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  popup.style.left = (e.clientX - ox) + 'px';
  popup.style.top = (e.clientY - oy) + 'px';
});
window.addEventListener('mouseup', () => {
  dragging = false;
  popup.style.boxShadow = '';
});

load(0);
</script>
</body>
</html>
